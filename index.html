<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b10;
    --surface: #0d1117;
    --card: #111820;
    --card-hover: #182030;
    --border: #1e2d3d;
    --border-glow: #00d4ff33;
    --accent: #00d4ff;
    --accent2: #ff3cac;
    --accent3: #7c3aed;
    --text: #e2eaf4;
    --muted: #5a7a99;
    --scanline: rgba(0,212,255,0.03);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,11,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span { color: var(--accent2); }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 38px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--border-glow);
  }

  #search::placeholder { color: var(--muted); }

  .count {
    margin-left: auto;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .count span { color: var(--accent); }

  /* Hero */
  .hero {
    text-align: center;
    padding: 4rem 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,212,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }

  .hero h1 .line1 { color: var(--text); }
  .hero h1 .line2 {
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent), 0 0 80px rgba(0,212,255,0.3);
    display: block;
  }

  .hero p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  /* Filter tabs */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    padding: 0 2rem 2rem;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px var(--border-glow);
  }

  /* Grid */
  .grid-container {
    padding: 0 1.5rem 4rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    text-decoration: none;
    display: block;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 30px rgba(0,212,255,0.15), 0 0 0 1px var(--border-glow);
    background: var(--card-hover);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0d1a26 0%, #111820 100%);
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
    position: relative;
    overflow: hidden;
  }

  .card-thumb-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(0,212,255,0.03) 10px,
      rgba(0,212,255,0.03) 20px
    );
  }

  .card-info {
    padding: 10px 12px 12px;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tag {
    display: inline-block;
    margin-top: 5px;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,212,255,0.2);
    width: 100%;
    max-width: 1100px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    letter-spacing: 0.08em;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-new-tab {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }

  .modal-new-tab:hover { border-color: var(--accent); color: var(--accent); }

  .modal iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
    background: #000;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; gap: 0.75rem; }
    .count { display: none; }
    .hero { padding: 2.5rem 1rem 1.5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
    .grid-container { padding: 0 0.75rem 3rem; }
  }
</style>

// Thumbnail map — using Google's favicon service + game-specific images via CDN
// We use a curated thumbnail from multiple free sources
function getThumbnail(file) {
  const name = file.replace(/\.html?$/, '').toLowerCase();
  const thumbMap = {
    '2048': 'https://play-lh.googleusercontent.com/in2AvPexR8KFX6sPx9QsA4hPeMPymT3mJRBhFBqQ0-Zq6fQ5MvtH2Pjfx8vKVCMrKK8=s256',
    'slope': 'https://img.gamedistribution.com/fd5d1f7c6c704bb18c8e193339dbcf29-512x512.jpg',
    'run3': 'https://img.gamedistribution.com/5c8cbdb8bc474dd38fc8da5ee85d3f9d-512x512.jpg',
    'cookieclicker': 'https://img.gamedistribution.com/e51e4f5a15994bef97ee0a9c2d58ef6b-512x512.jpg',
    'flappybird': 'https://img.gamedistribution.com/aedf4b6181a34da0be76c6f8dd3ef1de-512x512.jpg',
    'geometrydash': 'https://img.gamedistribution.com/f6f0c4b24e914ae2a3aee89e95d79803-512x512.jpg',
    'pacman': 'https://img.gamedistribution.com/5e0038f6c12f4a6db27f2fc4bac4b14b-512x512.jpg',
    'retrobowl': 'https://img.gamedistribution.com/18bc7ac6773a4e2c84e05e80b3e0b6fc-512x512.jpg',
    'chess': 'https://img.gamedistribution.com/7a82c22e3dad4a74b98a1c61be14f1e9-512x512.jpg',
    'minesweeper': 'https://img.gamedistribution.com/f2e7e2a4a84947f4b0a9e98f8e4b5a4a-512x512.jpg',
    'stickmanhook': 'https://img.gamedistribution.com/7dfe8f5a9c004c7f9e5c5caf8c8e5a5e-512x512.jpg',
    'driftboss': 'https://img.gamedistribution.com/5e4c5c5c5c5c5c5c5c5c5c5c5c5c5c5c-512x512.jpg',
    'ovo': 'https://img.gamedistribution.com/4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e-512x512.jpg',
  };
  return thumbMap[name] || null;
}

// Generate emoji icon based on tags
function getEmoji(tags) {
  const t = tags[0];
  const map = {
    'action': '⚔️', 'shooter': '🔫', 'puzzle': '🧩', 'platformer': '🏃',
    'driving': '🏎️', 'sports': '⚽', 'strategy': '🧠', 'simulation': '🎮',
    'io': '🌐', 'runner': '🏃', 'arcade': '👾', 'clicker': '🖱️',
    'horror': '👻', 'multiplayer': '👥', 'tower-defense': '🗼',
    'casual': '🎯', 'classic': '🕹️', 'rhythm': '🎵', 'music': '🎵',
    'other': '❓'
  };
  return map[t] || '🎮';
}

// Get all unique tags
const allTags = ['all', ...new Set(games.flatMap(g => g.tags))].sort((a,b) => {
  if (a==='all') return -1; if (b==='all') return 1; return a.localeCompare(b);
});

let activeTag = 'all';
let searchVal = '';

// Build filters
const filtersEl = document.getElementById('filters');
allTags.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (tag === 'all' ? ' active' : '');
  btn.textContent = tag === 'all' ? 'ALL GAMES' : tag.toUpperCase().replace('-', ' ');
  btn.dataset.tag = tag;
  btn.addEventListener('click', () => {
    activeTag = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  filtersEl.appendChild(btn);
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value.toLowerCase();
  render();
});

// Render grid
const grid = document.getElementById('grid');
const countNum = document.getElementById('countNum');

function render() {
  const filtered = games.filter(g => {
    const tagOk = activeTag === 'all' || g.tags.includes(activeTag);
    const searchOk = !searchVal || g.title.toLowerCase().includes(searchVal);
    return tagOk && searchOk;
  });

  countNum.textContent = filtered.length;

  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">// NO GAMES FOUND //</div>';
    return;
  }

  filtered.forEach(g => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = '#';
    card.setAttribute('aria-label', g.title);

    const thumb = getThumbnail(g.file);

    let thumbHtml;
    if (thumb) {
      thumbHtml = `<img class="card-thumb" src="${thumb}" alt="${g.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-thumb-placeholder" style="display:none">${getEmoji(g.tags)}</div>`;
    } else {
      thumbHtml = `<div class="card-thumb-placeholder">${getEmoji(g.tags)}</div>`;
    }

    card.innerHTML = `
      ${thumbHtml}
      <div class="card-info">
        <div class="card-title">${g.title}</div>
        <div class="card-tag">${g.tags[0].replace('-',' ')}</div>
      </div>
    `;

    card.addEventListener('click', e => {
      e.preventDefault();
      openModal(g);
    });

    grid.appendChild(card);
  });
}

// Modal
const overlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const modalFrame = document.getElementById('modalFrame');
const modalNewTab = document.getElementById('modalNewTab');
const modalClose = document.getElementById('modalClose');

function openModal(g) {
  modalTitle.textContent = g.title.toUpperCase();
  modalFrame.src = g.file;
  modalNewTab.href = g.file;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  modalFrame.src = '';
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
countNum.textContent = games.length;
render();
</script>
