<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNBLOCK3DGAM3S</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --glass-bg: rgba(255,255,255,0.08);
  --glass-bg-hover: rgba(255,255,255,0.14);
  --glass-border: rgba(255,255,255,0.18);
  --glass-border-hover: rgba(255,255,255,0.35);
  --glass-header: rgba(10,10,20,0.55);
  --text: #ffffff;
  --text-sub: rgba(255,255,255,0.55);
  --text-muted: rgba(255,255,255,0.35);
  --accent: #007aff;
  --accent2: #bf5af2;
  --radius-card: 18px;
  --radius-sm: 10px;
}

html{scroll-behavior:smooth}

body{
  min-height:100vh;
  background:#080810;
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  overflow-x:hidden;
}

/* Animated background */
.bg-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.35;
  animation:drift 20s ease-in-out infinite;
}

.bg-orb:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,#1a0a6e,transparent);top:-100px;left:-100px;animation-duration:25s}
.bg-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,#0a1a6e,transparent);bottom:-100px;right:-100px;animation-duration:18s;animation-delay:-8s}
.bg-orb:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,#3d0a6e,transparent);top:40%;left:40%;animation-duration:22s;animation-delay:-4s}
.bg-orb:nth-child(4){width:300px;height:300px;background:radial-gradient(circle,#0a3d6e,transparent);top:20%;right:20%;animation-duration:15s;animation-delay:-12s}

@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.05)}
  66%{transform:translate(-20px,30px) scale(0.95)}
}

/* Fine grid overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* ─── HEADER ─── */
header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--glass-header);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-bottom:0.5px solid var(--glass-border);
  padding:0 1.5rem;
  height:58px;
  display:flex;
  align-items:center;
  gap:1rem;
}

.logo{
  font-size:1rem;
  font-weight:700;
  letter-spacing:0.04em;
  color:var(--text);
  white-space:nowrap;
  flex-shrink:0;
  font-family:'Inter',sans-serif;
}

.logo .bracket{color:rgba(255,255,255,0.3)}
.logo .three{color:#007aff}

.search-wrap{
  flex:1;
  max-width:420px;
  position:relative;
}

.search-icon{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  width:14px;
  height:14px;
  color:var(--text-muted);
  pointer-events:none;
}

#search{
  width:100%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:0.5px solid var(--glass-border);
  border-radius:10px;
  padding:7px 12px 7px 33px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:0.85rem;
  outline:none;
  transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
}

#search:focus{
  border-color:rgba(0,122,255,0.6);
  background:rgba(255,255,255,0.12);
  box-shadow:0 0 0 3px rgba(0,122,255,0.15);
}

#search::placeholder{color:var(--text-muted)}

.header-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:0.75rem;
  flex-shrink:0;
}

.game-count{
  font-size:0.75rem;
  color:var(--text-muted);
  font-weight:500;
  letter-spacing:0.03em;
}

.game-count span{color:rgba(255,255,255,0.7)}

/* ─── HERO ─── */
.hero{
  position:relative;
  z-index:2;
  text-align:center;
  padding:3.5rem 1.5rem 2rem;
}

.hero-eyebrow{
  display:inline-block;
  background:rgba(0,122,255,0.15);
  border:0.5px solid rgba(0,122,255,0.3);
  border-radius:20px;
  padding:4px 14px;
  font-size:0.72rem;
  font-weight:600;
  letter-spacing:0.1em;
  color:rgba(120,170,255,0.9);
  text-transform:uppercase;
  margin-bottom:1.2rem;
}

.hero h1{
  font-size:clamp(2rem,5vw,3.2rem);
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.1;
  margin-bottom:0.75rem;
}

.hero h1 span{
  background:linear-gradient(135deg,#ffffff 0%,rgba(180,200,255,0.9) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero p{
  color:var(--text-sub);
  font-size:0.95rem;
  font-weight:400;
}

/* ─── FILTERS ─── */
.filters-wrap{
  position:relative;
  z-index:2;
  padding:0 1.5rem 1.5rem;
  overflow-x:auto;
  scrollbar-width:none;
}

.filters-wrap::-webkit-scrollbar{display:none}

.filters{
  display:flex;
  gap:0.5rem;
  flex-wrap:nowrap;
  width:max-content;
  margin:0 auto;
}

.filter-pill{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:0.5px solid var(--glass-border);
  border-radius:20px;
  padding:6px 16px;
  font-size:0.76rem;
  font-weight:500;
  color:var(--text-sub);
  cursor:pointer;
  transition:all 0.18s;
  white-space:nowrap;
  letter-spacing:0.02em;
  font-family:'Inter',sans-serif;
}

.filter-pill:hover{
  background:rgba(255,255,255,0.12);
  border-color:var(--glass-border-hover);
  color:var(--text);
}

.filter-pill.active{
  background:rgba(0,122,255,0.25);
  border-color:rgba(0,122,255,0.5);
  color:#ffffff;
  box-shadow:0 0 0 1px rgba(0,122,255,0.3) inset;
}

/* ─── GRID ─── */
.grid-wrap{
  position:relative;
  z-index:2;
  padding:0 1.25rem 5rem;
  max-width:1600px;
  margin:0 auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:14px;
}

/* ─── CARD ─── */
.card{
  background:var(--glass-bg);
  backdrop-filter:blur(24px) saturate(150%);
  -webkit-backdrop-filter:blur(24px) saturate(150%);
  border:0.5px solid var(--glass-border);
  border-radius:var(--radius-card);
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.22s cubic-bezier(.25,.8,.25,1),
             border-color 0.2s,
             background 0.2s,
             box-shadow 0.22s;
  position:relative;
  text-decoration:none;
  display:block;
  will-change:transform;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:var(--radius-card);
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);
  pointer-events:none;
  z-index:1;
}

.card:hover{
  transform:translateY(-5px) scale(1.01);
  border-color:var(--glass-border-hover);
  background:var(--glass-bg-hover);
  box-shadow:0 20px 40px rgba(0,0,0,0.4),
             0 0 0 0.5px rgba(255,255,255,0.12) inset;
}

.card:active{transform:translateY(-2px) scale(0.99)}

.thumb-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  background:#0a0a1a;
}

.card-thumb{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform 0.3s ease;
}

.card:hover .card-thumb{transform:scale(1.06)}

.thumb-fallback{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(0,30,80,0.8),rgba(20,0,60,0.8));
  font-size:2rem;
  gap:6px;
}

.thumb-fallback span{
  font-size:0.65rem;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.06em;
  font-weight:500;
  text-transform:uppercase;
}

.thumb-shimmer{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
  animation:shimmer 2s ease-in-out infinite;
  pointer-events:none;
}

@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

.play-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 0.2s;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(2px);
  z-index:2;
}

.card:hover .play-overlay{opacity:1}

.play-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
}

.play-btn svg{
  width:18px;
  height:18px;
  fill:white;
  margin-left:2px;
}

.card-body{
  padding:11px 13px 13px;
  position:relative;
  z-index:2;
}

.card-title{
  font-size:0.82rem;
  font-weight:600;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:4px;
  letter-spacing:0.01em;
}

.card-meta{
  display:flex;
  align-items:center;
  gap:6px;
}

.card-tag{
  font-size:0.65rem;
  font-weight:500;
  color:rgba(120,170,255,0.8);
  text-transform:uppercase;
  letter-spacing:0.07em;
}

/* ─── EMPTY ─── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:5rem 0;
  color:var(--text-muted);
  font-size:0.9rem;
}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;
  inset:0;
  z-index:200;
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}

.modal-overlay.open{display:flex}

.modal-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

.modal{
  position:relative;
  z-index:1;
  width:100%;
  max-width:1200px;
  height:94vh;
  background:rgba(12,12,24,0.85);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:0.5px solid var(--glass-border);
  border-radius:24px 24px 0 0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 -20px 80px rgba(0,0,0,0.6);
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(.32,.72,0,1);
}

.modal-overlay.open .modal{transform:translateY(0)}

.modal-handle{
  width:36px;
  height:4px;
  background:rgba(255,255,255,0.2);
  border-radius:2px;
  margin:10px auto 0;
  flex-shrink:0;
}

.modal-header{
  display:flex;
  align-items:center;
  gap:0.75rem;
  padding:10px 16px 12px;
  border-bottom:0.5px solid var(--glass-border);
  flex-shrink:0;
}

.modal-title{
  font-size:0.9rem;
  font-weight:600;
  color:var(--text);
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.modal-btn{
  background:rgba(255,255,255,0.08);
  border:0.5px solid var(--glass-border);
  border-radius:8px;
  color:rgba(255,255,255,0.6);
  padding:6px 12px;
  font-size:0.72rem;
  font-weight:500;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all 0.15s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:4px;
  white-space:nowrap;
}

.modal-btn:hover{
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.3);
  color:var(--text);
}

.modal-close{
  background:rgba(255,255,255,0.08);
  border:0.5px solid var(--glass-border);
  border-radius:50%;
  width:30px;
  height:30px;
  color:rgba(255,255,255,0.6);
  cursor:pointer;
  font-size:0.85rem;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
  font-family:'Inter',sans-serif;
}

.modal-close:hover{
  background:rgba(255,60,60,0.2);
  border-color:rgba(255,60,60,0.3);
  color:#ff6060;
}

.modal iframe{
  flex:1;
  border:none;
  background:#000;
  display:block;
}

@media(max-width:600px){
  header{padding:0 1rem;gap:0.6rem}
  .hero{padding:2rem 1rem 1.5rem}
  .hero h1{font-size:1.8rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .grid-wrap{padding:0 0.75rem 4rem}
  .game-count{display:none}
  .modal{height:96vh}
}
</style>

const allTags = ['all',...new Set(games.flatMap(g=>g.tags))].sort((a,b)=>{
  if(a==='all')return -1;if(b==='all')return 1;return a.localeCompare(b);
});

let activeTag='all',searchVal='';

// Build filter pills
const filtersEl=document.getElementById('filters');
allTags.forEach(tag=>{
  const btn=document.createElement('button');
  btn.className='filter-pill'+(tag==='all'?' active':'');
  btn.textContent=tag==='all'?'All Games':tag.charAt(0).toUpperCase()+tag.slice(1).replace('-',' ');
  btn.dataset.tag=tag;
  btn.addEventListener('click',()=>{
    activeTag=tag;
    document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  filtersEl.appendChild(btn);
});

document.getElementById('search').addEventListener('input',e=>{
  searchVal=e.target.value.toLowerCase();
  render();
});

  rhythm:   {a:'#bf5af2',b:'#7a35a0',c:'#ff375f',style:'wave'},
  music:    {a:'#bf5af2',b:'#7a35a0',c:'#ff375f',style:'wave'},
  other:    {a:'#2c2c2e',b:'#1c1c1e',c:'#8e8e93',style:'grid'},
};

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h);}
function rng(seed){return()=>{seed=Math.imul(seed^seed>>>15,seed|1);seed^=seed+Math.imul(seed^seed>>>7,seed|61);return((seed^seed>>>14)>>>0)/4294967296;};}

function makeThumb(title,tag){
  const W=336,H=189;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const th=THEMES[tag]||THEMES.other;
  const h=hashStr(title);
  const r=rng(h);

  // ── Background ──
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,th.b);bg.addColorStop(1,th.a);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // ── Style layer ──
  ctx.save();
  if(th.style==='slash'){
    // diagonal speed lines
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=14;
    for(let i=-4;i<8;i++){ctx.beginPath();ctx.moveTo(i*60-30,0);ctx.lineTo(i*60+60,H);ctx.stroke();}
  } else if(th.style==='crosshair'){
    // concentric circles + cross
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    [30,55,80,110].forEach(r2=>{ctx.beginPath();ctx.arc(W/2,H/2,r2,0,Math.PI*2);ctx.stroke();});
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  } else if(th.style==='grid'){
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  } else if(th.style==='blocks'){
    // pixel blocks scattered
    ctx.fillStyle='rgba(255,255,255,0.05)';
    for(let i=0;i<18;i++){const bx=Math.floor(r()*13)*24,by=Math.floor(r()*8)*24;ctx.fillRect(bx,by,22,22);}
  } else if(th.style==='speed'){
    // horizontal streaks
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    for(let i=0;i<12;i++){const y=r()*H,len=60+r()*120;ctx.lineWidth=1+r()*3;ctx.beginPath();ctx.moveTo(r()*80,y);ctx.lineTo(r()*80+len,y);ctx.stroke();}
  } else if(th.style==='field'){
    // curved field lines
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1.5;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(W/2,H/2,60+i*25,30+i*12,0,0,Math.PI*2);ctx.stroke();}
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  } else if(th.style==='hex'){
    // hexagon pattern
    const drawHex=(hx,hy,hr)=>{ctx.beginPath();for(let a=0;a<6;a++){const ang=Math.PI/3*a-Math.PI/6;ctx.lineTo(hx+hr*Math.cos(ang),hy+hr*Math.sin(ang));}ctx.closePath();};
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;
    for(let row=0;row<4;row++){for(let col=0;col<6;col++){drawHex(col*50+(row%2)*25,row*44,20);ctx.stroke();}}
  } else if(th.style==='dots'){
    ctx.fillStyle='rgba(255,255,255,0.05)';
    for(let i=0;i<30;i++){const dr=2+r()*5;ctx.beginPath();ctx.arc(r()*W,r()*H,dr,0,Math.PI*2);ctx.fill();}
  } else if(th.style==='pixels'){
    // retro pixel scatter
    for(let i=0;i<25;i++){ctx.fillStyle=`rgba(255,255,255,${0.03+r()*0.07})`;const ps=6+Math.floor(r()*3)*2;ctx.fillRect(Math.floor(r()*W/ps)*ps,Math.floor(r()*H/ps)*ps,ps,ps);}
  } else if(th.style==='circles'){
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    for(let i=0;i<6;i++){const cr=15+r()*55;ctx.beginPath();ctx.arc(r()*W,r()*H,cr,0,Math.PI*2);ctx.stroke();}
  } else if(th.style==='wave'){
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=2;
    for(let wi=0;wi<5;wi++){ctx.beginPath();for(let x=0;x<=W;x+=4){ctx.lineTo(x,H/2+Math.sin((x/W*Math.PI*4)+(wi*0.8))*((wi+1)*9));}ctx.stroke();}
  }
  ctx.restore();

  // ── Radial glow center ──
  const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,90);
  glow.addColorStop(0,'rgba(255,255,255,0.1)');glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);

  // ── Accent color splash (top-right corner) ──
  const splash=ctx.createRadialGradient(W,0,0,W,0,100);
  splash.addColorStop(0,th.c+'55');splash.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=splash;ctx.fillRect(0,0,W,H);

  // ── Bottom gradient for text legibility ──
  const scrim=ctx.createLinearGradient(0,H*0.45,0,H);
  scrim.addColorStop(0,'rgba(0,0,0,0)');scrim.addColorStop(1,'rgba(0,0,0,0.78)');
  ctx.fillStyle=scrim;ctx.fillRect(0,0,W,H);

  // ── Title text — large, bold, centered-bottom ──
  ctx.textAlign='center';ctx.textBaseline='bottom';
  const words=title.split(' ');
  let lines=[],line='';
  ctx.font='bold 22px "Inter",system-ui,sans-serif';
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>W-28&&line){lines.push(line);line=w;}else line=test;
  }
  lines.push(line);
  // Scale down font if 3+ lines
  const fs=lines.length>2?16:lines.length>1?19:22;
  ctx.font=`bold ${fs}px "Inter",system-ui,sans-serif`;
  // Rebuild lines at new font size
  lines=[];line='';
  for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>W-28&&line){lines.push(line);line=w;}else line=test;}
  lines.push(line);
  const lineH=fs+4;
  const totalH=lines.length*lineH;
  let y=H-10;
  // Shadow
  ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=8;ctx.shadowOffsetY=1;
  // Draw lines bottom-up
  [...lines].reverse().forEach((l,i)=>{
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.fillText(l,W/2,y-i*lineH);
  });
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  // ── Tag pill ──
  const pill=tag.toUpperCase().replace('-',' ');
  ctx.font='bold 9px "Inter",system-ui,sans-serif';
  const pw=ctx.measureText(pill).width+14;
  const px=W/2-pw/2,py=H-totalH-20;
  ctx.fillStyle=th.c+'cc';
  roundRect(ctx,px,py,pw,14,4);
  ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.textBaseline='middle';
  ctx.fillText(pill,W/2,py+7);

  return canvas.toDataURL('image/jpeg',0.88);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function render(){
  const filtered=games.filter(g=>{
    const tagOk=activeTag==='all'||g.tags.includes(activeTag);
    const searchOk=!searchVal||g.t.toLowerCase().includes(searchVal);
    return tagOk&&searchOk;
  });
  countNum.textContent=filtered.length;
  grid.innerHTML='';
  if(!filtered.length){
    grid.innerHTML='<div class="empty">No games found for that search.</div>';
    return;
  }
  filtered.forEach(g=>{
    const card=document.createElement('div');
    card.className='card';
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.setAttribute('aria-label','Play '+g.t);
    const tag=g.tags[0];
    const thumbDataUrl=makeThumb(g.t,tag);
    card.innerHTML=`
      <div class="thumb-wrap">
        <img class="card-thumb" src="${thumbDataUrl}" alt="${g.t}" loading="lazy" decoding="async">
        <div class="play-overlay">
          <div class="play-btn">
            <svg viewBox="0 0 16 16"><path d="M3 2.5l10 5.5-10 5.5V2.5z"/></svg>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${g.t}</div>
        <div class="card-meta">
          <div class="card-tag">${tag.charAt(0).toUpperCase()+tag.slice(1).replace('-',' ')}</div>
        </div>
      </div>`;
    const open=()=>openModal(g);
    card.addEventListener('click',open);
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
    grid.appendChild(card);
  });
}

// Modal
const overlay=document.getElementById('modalOverlay');
const modalEl=document.getElementById('modal');
const modalTitle=document.getElementById('modalTitle');
const modalFrame=document.getElementById('modalFrame');
const modalNewTab=document.getElementById('modalNewTab');

function openModal(g){
  modalTitle.textContent=g.t;
  const src='offline/'+g.f;
  modalFrame.src=src;
  modalNewTab.href=src;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  overlay.classList.remove('open');
  setTimeout(()=>{modalFrame.src='';},400);
  document.body.style.overflow='';
}

document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalBackdrop').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// Init
countNum.textContent=games.length;
render();
</script>
</body>
</html>
