<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:#0a0a0a;
  color:#fff;
  font-family:'Inter',system-ui,sans-serif;
  overflow-x:hidden;
}

/* ── Particle canvas ── */
#particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ── All content above particles ── */
header,main,footer,.modal-overlay{position:relative;z-index:1}

/* ── Header ── */
header{
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(220,30,30,0.2);
  padding:0 1.5rem;
  height:56px;
  display:flex;
  align-items:center;
  gap:1rem;
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  font-weight:900;
  font-size:1rem;
  letter-spacing:0.06em;
  color:#fff;
  white-space:nowrap;
  flex-shrink:0;
}
.logo .r{color:#e01010}

.search-wrap{flex:1;max-width:400px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}
#search{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  padding:7px 12px 7px 32px;
  color:#fff;
  font-size:0.85rem;
  font-family:inherit;
  outline:none;
  transition:border-color .15s;
}
#search:focus{border-color:rgba(220,30,30,0.6)}
#search::placeholder{color:#444}

.game-count{margin-left:auto;font-size:0.75rem;color:#555;white-space:nowrap}
.game-count b{color:#ccc}

/* ── Hero ── */
.hero{
  text-align:center;
  padding:3rem 1rem 1.5rem;
}
.hero h1{
  font-size:clamp(1.8rem,5vw,3rem);
  font-weight:900;
  letter-spacing:-0.02em;
  line-height:1;
  margin-bottom:0.5rem;
}
.hero h1 .r{color:#e01010}
.hero p{color:#555;font-size:0.9rem}

/* ── Filters ── */
.filters-wrap{
  padding:0 1.5rem 1.25rem;
  overflow-x:auto;
  scrollbar-width:none;
}
.filters-wrap::-webkit-scrollbar{display:none}
.filters{display:flex;gap:0.4rem;width:max-content;margin:0 auto}

.ftag{
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  color:#666;
  padding:5px 14px;
  font-size:0.72rem;
  font-weight:600;
  font-family:inherit;
  letter-spacing:0.05em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.ftag:hover{border-color:rgba(220,30,30,0.4);color:#ccc}
.ftag.active{border-color:#e01010;color:#fff;background:rgba(220,30,30,0.15)}

/* ── Grid ── */
.grid-wrap{
  max-width:1400px;
  margin:0 auto;
  padding:0 1.25rem 5rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;
}

/* ── Game button ── */
.game-btn{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:14px 12px;
  cursor:pointer;
  text-align:left;
  transition:background .15s, border-color .15s, transform .15s;
  display:block;
  width:100%;
  color:#fff;
  font-family:inherit;
}
.game-btn:hover{
  background:rgba(220,30,30,0.12);
  border-color:rgba(220,30,30,0.4);
  transform:translateY(-2px);
}
.game-btn:active{transform:translateY(0)}

.btn-title{
  font-size:0.82rem;
  font-weight:700;
  line-height:1.3;
  color:#eee;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.btn-tag{
  font-size:0.62rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.07em;
  color:#e01010;
  opacity:0.7;
}

/* ── Empty ── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:4rem 0;
  color:#444;
  font-size:0.85rem;
}

/* ── Modal ── */
.modal-overlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.modal-overlay.open{display:flex}

.modal-backdrop{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.modal{
  position:relative;
  z-index:1;
  width:100%;
  max-width:1200px;
  height:92vh;
  background:#111;
  border:1px solid rgba(220,30,30,0.25);
  border-radius:16px 16px 0 0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,.72,0,1);
}
.modal-overlay.open .modal{transform:translateY(0)}

.modal-handle{width:32px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 0;flex-shrink:0}

.modal-header{
  display:flex;
  align-items:center;
  gap:0.75rem;
  padding:10px 16px 12px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.modal-title{font-size:0.85rem;font-weight:700;flex:1;color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.modal-action{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;
  color:#888;
  padding:5px 11px;
  font-size:0.7rem;
  font-family:inherit;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  text-decoration:none;
  white-space:nowrap;
}
.modal-action:hover{border-color:rgba(220,30,30,0.4);color:#ccc}

.modal-close{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;
  width:28px;height:28px;
  color:#666;
  cursor:pointer;
  font-size:0.8rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  flex-shrink:0;
  font-family:inherit;
}
.modal-close:hover{border-color:rgba(220,30,30,0.5);color:#e01010}

.modal iframe{flex:1;border:none;background:#000;display:block}

@media(max-width:600px){
  .hero h1{font-size:1.6rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
  .grid-wrap{padding:0 0.75rem 3rem}
}
</style>

(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  let W,H,pts=[];
  const COUNT=55;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',()=>{resize();});

  function mkPt(){
    const size=Math.random()*2.5+1;
    return{
      x:Math.random()*W,
      y:Math.random()*H-H,
      vx:(Math.random()-0.5)*0.4,
      vy:Math.random()*0.8+0.3,
      size,
      alpha:Math.random()*0.5+0.2,
      r:Math.floor(180+Math.random()*60),
      g:Math.floor(Math.random()*20),
      b:Math.floor(Math.random()*20),
    };
  }

  for(let i=0;i<COUNT;i++){pts.push(mkPt());pts[i].y=Math.random()*H;}

  function frame(){
    ctx.clearRect(0,0,W,H);
    for(const p of pts){
      p.x+=p.vx;
      p.y+=p.vy;
      if(p.y>H+10){const n=mkPt();n.y=-10;Object.assign(p,n);}
      if(p.x<-10||p.x>W+10){p.x=Math.random()*W;}
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

const allTags=['all',...new Set(games.flatMap(g=>g.tags))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));
let activeTag='all',searchVal='';

const filtersEl=document.getElementById('filters');
allTags.forEach(tag=>{
  const b=document.createElement('button');
  b.className='ftag'+(tag==='all'?' active':'');
  b.textContent=tag==='all'?'All':tag.charAt(0).toUpperCase()+tag.slice(1).replace('-',' ');
  b.addEventListener('click',()=>{
    activeTag=tag;
    document.querySelectorAll('.ftag').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
  filtersEl.appendChild(b);
});

document.getElementById('search').addEventListener('input',e=>{searchVal=e.target.value.toLowerCase();render();});

const grid=document.getElementById('grid');
const countNum=document.getElementById('countNum');

function render(){
  const list=games.filter(g=>{
    const tok=activeTag==='all'||g.tags.includes(activeTag);
    const sok=!searchVal||g.t.toLowerCase().includes(searchVal);
    return tok&&sok;
  });
  countNum.textContent=list.length;
  grid.innerHTML='';
  if(!list.length){grid.innerHTML='<div class="empty">No games found.</div>';return;}
  list.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='game-btn';
    const tag=g.tags[0];
    btn.innerHTML=`<div class="btn-title">${g.t}</div><div class="btn-tag">${tag.replace('-',' ')}</div>`;
    btn.addEventListener('click',()=>openModal(g));
    grid.appendChild(btn);
  });
}

const overlay=document.getElementById('modalOverlay');
const modalTitle=document.getElementById('modalTitle');
const modalFrame=document.getElementById('modalFrame');
const modalNewTab=document.getElementById('modalNewTab');

function openModal(g){
  modalTitle.textContent=g.t;
  const src='offline/'+g.f;
  modalFrame.src=src;
  modalNewTab.href=src;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  overlay.classList.remove('open');
  setTimeout(()=>{modalFrame.src='';},350);
  document.body.style.overflow='';
}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalBackdrop').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

countNum.textContent=games.length;
render();
</script>
